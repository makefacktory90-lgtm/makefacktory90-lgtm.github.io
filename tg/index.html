<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Телега Иры Буян · IRA AI</title>
<!-- Канонический адрес телеги: iraai.ru/tg. Меняется домен назначения только здесь, одной строкой. -->
<meta http-equiv="refresh" content="0; url=https://telegram.me/ira_and_ai">
<link rel="canonical" href="https://telegram.me/ira_and_ai">
<style>
  :root{--ink:#111;--red:#E50914;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#fff;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .box{max-width:460px;text-align:center}
  .mark{font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#999;margin-bottom:18px}
  h1{font-size:clamp(26px,6vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:14px}
  p{color:#555;font-size:16px;margin-bottom:26px}
  a.btn{display:inline-block;background:var(--ink);color:#fff;text-decoration:none;font-weight:700;padding:15px 30px;font-size:15px;letter-spacing:.02em}
  a.btn:hover{background:var(--red)}
  .foot{margin-top:28px;font-family:ui-monospace,'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#aaa}
  .foot a{color:#aaa;text-decoration:none;border-bottom:1px solid #ddd}
</style>
</head>
<body>
<div class="box">
  <div class="mark">IRA&AI · Telegram</div>
  <h1>Открываю телегу</h1>
  <p>Секунда. Если не перекинуло, жмите кнопку.</p>
  <a class="btn" id="go" href="https://telegram.me/ira_and_ai">Перейти в телегу &rarr;</a>
  <div class="foot"><a href="https://iraai.ru/">iraai.ru</a></div>
</div>
<script>location.replace(document.getElementById('go').href);</script>
</body>
</html>
